  - id: 1
    title: Как опубликовать статью в JSLY's Public Blog
    showImage: false
    author: JSLY
    authorLink: https://github.com/J-SLY
    date: '2026-06-26'
    tags:
      - Учебник
    excerpt: 'JSLY''s Public Blog — это открытая колонка для сообщества. Это руководство шаг за шагом объясняет, как опубликовать статью: от создания Issue до форматирования контента.'
    content:
      - '## Что такое Public Blog?'
      - ''
      - JSLY's Public Blog — это колонка для сообщества, где любой желающий может публиковать статьи и делиться знаниями, опытом и мыслями с читателями.
      - ''
      - '## Процесс публикации'
      - ''
      - 'Процесс очень прост. Доступны два способа:'
      - ''
      - '### Способ 1: GitHub Issue (рекомендуется)'
      - ''
      - '#### Шаг 1: Нажмите «Опубликовать через GitHub»'
      - ''
      - На [главной странице Public Blog](/public/) нажмите кнопку «Опубликовать через GitHub». Вы будете перенаправлены на страницу создания Issue в GitHub с загруженным шаблоном.
      - ''
      - '#### Шаг 2: Заполните шаблон'
      - ''
      - 'Заполните следующую информацию в соответствии с шаблоном:'
      - ''
      - '- **Заголовок статьи** — название вашей статьи (обязательно)'
      - '- **Теги** — выберите подходящие теги'
      - '- **Краткое описание** — 50–200 символов (обязательно)'
      - '- **Текст статьи** — в формате Markdown (обязательно)'
      - ''
      - '> Имя автора будет автоматически взято из вашего GitHub username.'
      - ''
      - Отправьте Issue после заполнения.
      - ''
      - '### Способ 2: Публикация по email'
      - ''
      - 'Нет аккаунта GitHub? Просто отправьте письмо на [submit@support.jsly.asia](mailto:submit@support.jsly.asia) или [2029872426@qq.com](mailto:2029872426@qq.com). В письме укажите:'
      - ''
      - '- **Заголовок статьи**'
      - '- **Имя автора** (как вы хотите, чтобы вас указали)'
      - '- **Теги**'
      - '- **Краткое описание**'
      - '- **Текст статьи** (в формате Markdown)'
      - ''
      - Я вручную добавлю вашу статью в Public Blog.
      - ''
      - '### Шаг 3: Ожидайте проверки (одинаково для обоих способов)'
      - ''
      - После отправки я получу уведомление и проверю содержание. Одобренные статьи появятся в списке Public Blog.
      - ''
      - '## Справочник по Markdown'
      - ''
      - 'Поддерживается стандартный синтаксис Markdown. Вот некоторые распространённые форматы:'
      - ''
      - '### Заголовки'
      - ''
      - '```markdown'
      - '# Заголовок 1'
      - '## Заголовок 2'
      - '### Заголовок 3'
      - '```'
      - ''
      - '### Блоки кода'
      - ''
      - 'Поддерживается подсветка синтаксиса для многих языков:'
      - ''
      - '```python'
      - 'def hello():'
      - '    print(''Hello, Public Blog!'')'
      - '```'
      - ''
      - '```javascript'
      - const greeting = 'Hello';
      - console.log(greeting);
      - '```'
      - ''
      - '### Списки'
      - ''
      - '```markdown'
      - '- Элемент ненумерованного списка'
      - '- Другой элемент'
      - ''
      - 1. Элемент нумерованного списка
      - 2. Второй элемент
      - '```'
      - ''
      - '### Ссылки и изображения'
      - ''
      - '```markdown'
      - '[Текст ссылки](https://example.com)'
      - '![Описание изображения](url-картинки)'
      - '```'
      - ''
      - '## Важные замечания'
      - ''
      - '1. **Оригинальность**: Пожалуйста, публикуйте только собственные работы. Репосты требуют разрешения автора.'
      - '2. **Содержание**: Контент должен соответствовать законодательству и не содержать неподобающей информации.'
      - '3. **Лицензия**: Отправляя статью, вы соглашаетесь на её публикацию под лицензией AGPL-3.0.'
      - '4. **Критерии проверки**: Проверяется формат и соответствие нормам, а не субъективное мнение.'
      - ''
      - '## Часто задаваемые вопросы'
      - ''
      - '**В: Нужен ли аккаунт GitHub для публикации?**'
      - 'О: Не обязательно. Для способа через GitHub нужен аккаунт, но вы также можете отправить по email на submit@support.jsly.asia или 2029872426@qq.com.'
      - ''
      - '**В: Можно ли изменить статью после публикации?**'
      - 'О: Да. Отправьте Issue или свяжитесь со мной для обновления.'
      - ''
      - '**В: Сколько времени занимает проверка?**'
      - 'О: Обычно 1–3 рабочих дня.'
      - ''
      - '## Начните свою первую публикацию'
      - ''
      - Это всё руководство. Если ваша статья готова, [отправляйте](/public/) прямо сейчас!
      - ''
      - Ждём ваших интересных материалов 🚀
    readTimeMinutes: 3
    views: 0
