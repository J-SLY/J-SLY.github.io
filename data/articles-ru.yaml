articles:
  - id: 1
    title: Руководство по OpenCode
    series:
      name: OpenCode 入门
      order: 1
    date: '2026-06-21'
    tags:
      - OpenCode
      - ИИ
      - Инструменты
    excerpt: OpenCode — это мощный CLI-инструмент для программирования с помощью ИИ. В этой статье рассматриваются его основные функции и способы использования.
    content:
      - '## Что такое OpenCode?'
      - ''
      - OpenCode — это инструмент для программирования с помощью ИИ, работающий в терминале. Он понимает инструкции на естественном языке и помогает с написанием кода, рефакторингом, отладкой, генерацией документации и другими задачами разработки.
      - ''
      - '## Установка'
      - ''
      - '### Способ 1: глобальная установка через npm (рекомендуется)'
      - ''
      - '```bash'
      - npm install -g @opencode/cli
      - '```'
      - ''
      - После установки запустите `opencode` в терминале.
      - ''
      - '### Способ 2: через npx'
      - ''
      - '```bash'
      - npx @opencode/cli
      - '```'
      - ''
      - '### Способ 3: сборка из исходного кода'
      - ''
      - '```bash'
      - git clone https://github.com/anomalyco/opencode.git
      - cd opencode
      - npm install
      - npm run build
      - npm link
      - '```'
      - ''
      - '## Быстрый старт'
      - ''
      - 'Запустите в каталоге вашего проекта:'
      - ''
      - '```bash'
      - opencode
      - '```'
      - ''
      - После запуска интерфейса вы можете описывать свои потребности на естественном языке. OpenCode автоматически проанализирует вашу кодовую базу и выполнит необходимые действия.
      - ''
      - '## Основные возможности'
      - ''
      - '### 1. Редактирование кода'
      - ''
      - 'OpenCode может точно изменять содержимое файлов:'
      - ''
      - '- Замена по строковому совпадению'
      - '- Вставка и удаление блоков кода'
      - '- Пакетная замена'
      - ''
      - '### 2. Работа с файлами'
      - ''
      - 'Не нужно открывать файлы вручную:'
      - ''
      - '- Чтение содержимого файлов'
      - '- Создание новых файлов'
      - '- Поиск в содержимом файлов (с поддержкой регулярных выражений)'
      - '- Поиск файлов по шаблону'
      - ''
      - '### 3. Интеграция с Git'
      - ''
      - 'Управление версиями прямо в диалоге:'
      - ''
      - '- Просмотр статуса и изменений'
      - '- Индексация и коммит'
      - '- Просмотр истории'
      - ''
      - '### 4. Поиск в интернете'
      - ''
      - 'Когда нужно найти информацию, OpenCode может:'
      - ''
      - '- Искать в интернете'
      - '- Загружать страницы документации'
      - '- Получать последние новости из мира технологий'
      - ''
      - '### 5. Управление задачами'
      - ''
      - 'Сложные задачи можно разбить на несколько шагов:'
      - ''
      - '- Создание списков задач'
      - '- Отслеживание прогресса'
      - '- Автоматическое отслеживание завершения'
      - ''
      - '## Советы по использованию'
      - ''
      - '### Описывайте требования чётко'
      - ''
      - '```text'
      - ❌ Исправь эту функцию
      - ✅ Исправь проблему с точностью чисел с плавающей запятой в calculateTotal
      - '```'
      - ''
      - '### Используйте несколько агентов'
      - ''
      - 'OpenCode поддерживает несколько специализированных агентов:'
      - ''
      - '- **explore**: быстрый поиск по кодовой базе'
      - '- **general**: выполнение сложных многошаговых задач'
      - ''
      - '### Управляйте контекстом'
      - ''
      - Поддерживайте чистоту контекста при общении с OpenCode. Завершайте одну задачу перед началом следующей, чтобы избежать смешивания информации.
      - ''
      - '## Важные замечания'
      - ''
      - '- OpenCode не коммитит код автоматически — необходимо явно запросить это'
      - '- Конфиденциальная информация (ключи, пароли) не загружается'
      - '- Рекомендуется проверять сгенерированный код перед развёртыванием'
      - ''
      - '## Заключение'
      - ''
      - OpenCode глубоко интегрирует возможности ИИ в рабочий процесс разработки, позволяя вам сосредоточиться на решении задач и проектировании решений. Будь то повседневная разработка или изучение новых технологий — это надёжный помощник.
    image: images/opencode-terminal.svg
    readTimeMinutes: 3
    views: 42
  - id: 2
    pinned: true
    showImage: false
    title: Руководство по JSLY Blog
    date: '2026-06-21'
    tags:
      - Руководство
      - Учебник
    excerpt: Добро пожаловать в JSLY's Blog! Это руководство познакомит вас со всеми функциями блога и поможет быстро начать работу.
    content:
      - '## Добро пожаловать в JSLY''s Blog'
      - ''
      - JSLY's Blog — это статический блог на GitHub Pages, построенный на Vanilla HTML/CSS/JS без инструментов сборки. Он предлагает удобное чтение, мощный поиск и различные настройки. Это руководство проведёт вас по каждой функции.
      - ''
      - '## Навигация и структура страницы'
      - ''
      - 'Главная страница состоит из следующих разделов:'
      - ''
      - '### Hero-секция'
      - ''
      - В верхней части страницы отображается название блога и приветствие. Нажмите «Начать чтение», чтобы перейти к списку статей.
      - ''
      - '### Панель навигации'
      - ''
      - 'Верхняя фиксированная панель содержит ссылки: Главная, Статьи, Публичные публикации и Обо мне. Текущий раздел подсвечивается. На мобильных устройствах панель сворачивается в гамбургер-меню.'
      - ''
      - 'Полезные иконки справа:'
      - ''
      - '- **Переключение тёмной темы** — смена темы одним кликом'
      - '- **Настройки** — открыть настройки чтения'
      - '- **Поиск** — открыть диалог поиска'
      - '- **Меню** — развернуть навигацию на мобильных'
      - ''
      - '### Список статей'
      - ''
      - Раздел «Последние статьи» отображает все статьи в виде сетки карточек. Каждая карточка содержит название, теги, краткое описание, дату публикации, время чтения и количество просмотров. При наведении карточка приподнимается с эффектом тени.
      - ''
      - '### Обо мне'
      - ''
      - В разделе «Обо мне» отображается карточка профиля блогера с социальными ссылками и статистикой. Карточка автоматически переключается на тёмную тему.
      - ''
      - '### Подвал'
      - ''
      - В подвале находятся ссылки на социальные сети (QQ, GitHub, Luogu, Qzone, AtCoder), быстрые ссылки навигации и контактная информация.
      - ''
      - '## Взаимодействие с карточками статей'
      - ''
      - Нажмите на карточку статьи, чтобы открыть её. Если у статьи есть изображение, оно отображается в верхней части карточки; иначе используется градиент-заполнитель.
      - ''
      - '## Два режима чтения'
      - ''
      - 'Нажмите на иконку шестерёнки в панели навигации, чтобы открыть настройки и переключить режим просмотра:'
      - ''
      - '### Модальный режим (по умолчанию)'
      - ''
      - Статьи открываются в модальном окне поверх текущей страницы. Поддерживаются индикатор прогресса чтения, закрытие по ESC и по клику вне окна, подсветка разделов в содержании при прокрутке.
      - ''
      - '### Режим новой страницы'
      - ''
      - Статьи открываются в новой вкладке (`/article/{id}`), что удобно для чтения нескольких статей или сохранения главной страницы. Ссылка «Назад к статьям» доступна вверху.
      - ''
      - Настройки сохраняются в Cookie и не сбрасываются после закрытия браузера.
      - ''
      - '## Поиск'
      - ''
      - 'Нажмите на иконку поиска в панели навигации. Поддерживаются два метода:'
      - ''
      - '### Поиск по ключевым словам'
      - ''
      - Введите ключевые слова для поиска по названиям, тегам, кратким описаниям и полному тексту статей в реальном времени. Совпадения подсвечиваются.
      - ''
      - '### Поиск по пиньиню'
      - ''
      - Интегрирована библиотека pinyin-pro для поиска по пиньиню. Например, поиск «zhinan» найдет статьи с «指南» в названии. Требуется минимум 2 символа.
      - ''
      - '### Клавиатурная навигация'
      - ''
      - В диалоге поиска используйте ↑/↓ для навигации, Enter для открытия статьи, ESC для закрытия.
      - ''
      - '## Возможности статей'
      - ''
      - 'После открытия статьи доступны следующие функции:'
      - ''
      - '### Содержание и подсветка при прокрутке'
      - ''
      - Слева отображается боковая панель содержания, автоматически созданная из заголовков H1/H2/H3. Текущий раздел подсвечивается при прокрутке. Нажмите на пункт содержания для плавного перехода.
      - ''
      - '### Поделиться'
      - ''
      - Кнопка «Поделиться» внизу каждой статьи. В поддерживаемых браузерах вызывает системный диалог, иначе копирует ссылку в буфер обмена.
      - ''
      - '### Комментарии'
      - ''
      - Внизу каждой статьи интегрирована система комментариев Giscus (на основе GitHub Discussions). Войдите через GitHub, чтобы комментировать и отвечать. Тема комментариев автоматически следует за тёмным режимом.
      - ''
      - '## Тёмная тема'
      - ''
      - Нажмите на иконку луны/солнца для переключения. Панель навигации, карточки статей, подсветка кода, карточка профиля и комментарии адаптируются автоматически. Настройка сохраняется в localStorage, при первом посещении определяется системная тема.
      - ''
      - '## Глубокие ссылки'
      - ''
      - 'Поддерживаются два типа глубоких ссылок:'
      - ''
      - '- **Хэш-ссылки**: `index.html#article-N` — открывает модальное окно статьи прямо на главной'
      - '- **Ссылки-страницы**: `/article/{id}` — отображает полную статью на отдельной странице'
      - ''
      - Если указанный ID статьи не существует, автоматически показывается 404. Оба типа ссылок совместимы. Для отправки ссылок другим используйте формат `/article/{id}`.
      - ''
      - '## Публичные публикации'
      - ''
      - Существует специальный раздел [Публичные публикации](/public/), где участники сообщества могут публиковать статьи.
      - ''
      - '### Как получить доступ?'
      - ''
      - Нажмите «Публичное» в панели навигации или перейдите по ссылке `/public/`. Страница имеет собственный Hero-раздел и список статей в едином стиле с основным блогом.
      - ''
      - '### Как опубликовать?'
      - ''
      - 'Поддерживаются два способа:'
      - ''
      - '- **GitHub Issue** (рекомендуется) — Нажмите «Опубликовать через GitHub», заполните шаблон и отправьте Issue. Ваше имя пользователя GitHub будет автоматически указано как автор.'
      - '- **Email** — Отправьте письмо на submit@support.jsly.asia с заголовком статьи, текстом (Markdown) и вашим именем.'
      - ''
      - Публикации проходят проверку перед публикацией. Одобренные статьи появятся в разделе «Публичные публикации».
      - ''
      - '### Чтение публичных статей'
      - ''
      - Публичные статьи также поддерживают модальный режим и режим новой страницы, содержание, подсветку кода, комментарии (Giscus) и возможность поделиться. На карточках отображаются значки авторов.
      - ''
      - '## Заключение'
      - ''
      - Несмотря на простую статическую архитектуру, JSLY's Blog обеспечивает полный и комфортный опыт чтения. Весь исходный код открыт на GitHub (AGPL-3.0). Если у вас есть вопросы или предложения, свяжитесь через контакты в подвале или комментарии к статьям.
      - ''
      - Happy reading!
    readTimeMinutes: 6
    views: 0
  - id: 3
    title: Подробный разбор AI-агентов OpenCode
    series:
      name: OpenCode 入门
      order: 2
    date: '2026-06-30'
    tags:
      - OpenCode
      - ИИ
      - Агенты
    excerpt: Глубокое погружение в архитектуру системы агентов OpenCode. Узнайте, как работают специализированные агенты explore, general и другие.
    content:
      - '## Обзор системы агентов'
      - ''
      - В основе OpenCode лежит система агентов. Каждый агент — это специализированный ИИ-помощник, который擅长 в определённых типах задач. Правильный выбор и комбинация агентов позволяют эффективно решать задачи от поиска по коду до сложного рефакторинга.
      - ''
      - '## Агент explore'
      - ''
      - 'Агент explore специализируется на быстром поиске и анализе кодовой базы:'
      - ''
      - '- **Быстрый поиск**: нахождение кода по ключевым словам или шаблонам'
      - '- **Понимание архитектуры**: анализ структуры проекта и зависимостей модулей'
      - '- **Ревью кода**: выявление потенциальных проблем и понимание логики'
      - ''
      - '### Пример использования'
      - ''
      - '```text'
      - 'Вы: Найди весь код, связанный с аутентификацией пользователей, и объясни流程'
      - 'explore: Поиск файлов по ключевым словам "auth", "login"...'
      - '     Найдены ключевые файлы:'
      - '     - src/auth/login.ts — Логика входа'
      - '     - src/auth/verify.ts — Проверка токена'
      - '     - src/middleware/auth.ts — Промежуточное ПО аутентификации'
      - '```'
      - ''
      - '## Агент general'
      - ''
      - 'Агент general — основной рабочий агент OpenCode, способный выполнять многошаговые сложные задачи:'
      - ''
      - '- **Рефакторинг кода**: анализ, планирование и выполнение рефакторинга'
      - '- **Разработка функций**: полный цикл от требований до реализации'
      - '- **Исправление ошибок**: поиск причины и устранение'
      - '- **Документация**: генерация README, API-документации'
      - ''
      - '### Рабочий процесс'
      - ''
      - 'Агент general выполняет сложные задачи по следующему плану:'
      - ''
      - '1. **Понимание требований**: анализ вашего описания на естественном языке'
      - '2. **Планирование**: разбивка задачи на выполнимые подшаги'
      - '3. **Выполнение**: последовательное выполнение каждого подшага'
      - '4. **Проверка**: подтверждение соответствия результатов ожиданиям'
      - '5. **Отчёт**: предоставление полной сводки выполнения'
      - ''
      - '## Управление задачами'
      - ''
      - 'OpenCode предоставляет мощные средства управления задачами:'
      - ''
      - '### Списки задач'
      - ''
      - '```text'
      - 'Вы: Создай список задач для добавления системы прав пользователей'
      - 'OpenCode: Созданы задачи:'
      - '        [ ] 1. Проектирование модели данных прав'
      - '        [ ] 2. Реализация CRUD для управления ролями'
      - '        [ ] 3. Добавление中间件 проверки прав'
      - '        [ ] 4. Интеграция с существующими маршрутами'
      - '        [ ] 5. Написание тестов'
      - '```'
      - ''
      - '## Совместная работа агентов'
      - ''
      - 'В сложных сценариях несколько агентов могут работать вместе:'
      - ''
      - '- **explore → general**: explore анализирует, general выполняет'
      - '- **Разделение труда**: explore анализирует, general вносит изменения'
      - '- **Релейный режим**: вывод одного агента становится входом для другого'
      - ''
      - '## Рекомендации'
      - ''
      - '- **Указывайте агента**: называйте нужного агента в начале разговора'
      - '- **Шаг за шагом**: разбивайте сложные задачи на мелкие шаги'
      - '- **Подтверждайте прогресс**: проверяйте результаты после каждого ключевого шага'
      - '- **Сбрасывайте контекст**: начинайте новый разговор после завершения задачи'
      - ''
      - '## Заключение'
      - ''
      - Освоение системы агентов OpenCode — ключ к эффективному использованию. explore отвечает за «чтение» кода, general — за «изменение» кода. Вместе они могут справиться с любыми задачами от простых запросов до сложного рефакторинга.
    image: images/opencode-terminal.svg
    readTimeMinutes: 5
    views: 0
  - id: 4
    title: Продвинутые техники и лучшие практики OpenCode
    series:
      name: OpenCode 入门
      order: 3
    date: '2026-06-30'
    tags:
      - OpenCode
      - ИИ
      - Советы
    excerpt: 'Освойте продвинутые техники OpenCode: оптимизация конфигурации, инженерия промптов, практики безопасности и интеграция рабочих процессов.'
    content:
      - '## Файл конфигурации'
      - ''
      - 'OpenCode поддерживает настройку через файл конфигурации. Создайте `.opencode.json` в корне проекта:'
      - ''
      - '```json'
      - '{'
      - '  "agents": {'
      - '    "explore": { "maxFiles": 50 },'
      - '    "general": { "autoConfirm": false }'
      - '  },'
      - '  "git": {'
      - '    "autoFetch": true,'
      - '    "commitTemplate": "feat: {message}"'
      - '  },'
      - '  "search": {'
      - '    "excludePatterns": ["node_modules", "dist"]'
      - '  }'
      - '}'
      - '```'
      - ''
      - '## Инженерия промптов'
      - ''
      - 'Качество общения напрямую влияет на результат:'
      - ''
      - '### Структурированное описание'
      - ''
      - '```text'
      - ❌ Оптимизируй эту функцию
      - '✅ Пожалуйста, оптимизируй функцию formatDate в src/utils/format.ts:'
      - '   - Текущая проблема: не поддерживает параметр timezone, код избыточен'
      - '   - Ожидание: принимает параметр timezone, переписать через Intl.DateTimeFormat'
      - '   - Сохранить: существующую сигнатуру интерфейса без изменений'
      - '```'
      - ''
      - '## Практики безопасности'
      - ''
      - '### Конфиденциальная информация'
      - ''
