articles:
  - id: 1
    title: OpenCode 使用ガイド
    category: OpenCode
    series:
      name: OpenCode 入门
      order: 1
    date: '2026-06-21'
    tags:
      - OpenCode
      - AI
      - ツール
    excerpt: OpenCode は強力な AI 支援 CLI プログラミングツールです。この記事ではそのコア機能と使用方法を紹介します。
    content:
      - '## OpenCode とは？'
      - ''
      - OpenCode はターミナル上で動作する AI 支援プログラミングツールです。自然言語の指示を理解し、コード作成、リファクタリング、デバッグ、ドキュメント生成などのソフトウェアエンジニアリングタスクを支援します。
      - ''
      - '## インストール'
      - ''
      - '### 方法1：npm グローバルインストール（推奨）'
      - ''
      - '```bash'
      - npm install -g @opencode/cli
      - '```'
      - ''
      - インストール後、ターミナルで `opencode` を実行して起動します。
      - ''
      - '### 方法2：npx を使用'
      - ''
      - '```bash'
      - npx @opencode/cli
      - '```'
      - ''
      - '### 方法3：ソースからビルド'
      - ''
      - '```bash'
      - git clone https://github.com/anomalyco/opencode.git
      - cd opencode
      - npm install
      - npm run build
      - npm link
      - '```'
      - ''
      - '## クイックスタート'
      - ''
      - プロジェクトディレクトリで次のコマンドを実行します：
      - ''
      - '```bash'
      - opencode
      - '```'
      - ''
      - 会話インターフェースが起動したら、自然言語で要件を説明するだけで、OpenCode が自動的にコードベースを分析し、適切な操作を実行します。
      - ''
      - '## コア機能'
      - ''
      - '### 1. コード編集'
      - ''
      - OpenCode はファイル内容を正確に修正でき、以下をサポート：
      - ''
      - '- 文字列一致による置換'
      - '- コードブロックの挿入・削除'
      - '- 一括置換'
      - ''
      - '### 2. ファイル操作'
      - ''
      - 手動でファイルを開く必要なし：
      - ''
      - '- ファイル内容の読み込み'
      - '- 新規ファイルの作成'
      - '- ファイル内容の検索（正規表現対応）'
      - '- ワイルドカードによるファイル検索'
      - ''
      - '### 3. Git 統合'
      - ''
      - 会話の中で直接バージョン管理：
      - ''
      - '- ステータスと変更の表示'
      - '- ステージングとコミット'
      - '- 履歴の表示'
      - ''
      - '### 4. Web 検索'
      - ''
      - 情報が必要なとき、OpenCode は：
      - ''
      - '- ウェブ検索'
      - '- ドキュメントページの取得'
      - '- 最新技術情報の取得'
      - ''
      - '### 5. タスク管理'
      - ''
      - 複雑なタスクを複数のステップに分割：
      - ''
      - '- タスクリストの作成'
      - '- 進捗の記録'
      - '- 完了状態の自動追跡'
      - ''
      - '## 使用のコツ'
      - ''
      - '### 要件を明確に記述'
      - ''
      - '```text'
      - ❌ この関数を修正して
      - ✅ calculateTotal 関数の浮動小数点精度の問題を修正して
      - '```'
      - ''
      - '### マルチエージェント活用'
      - ''
      - OpenCode は複数の専用エージェントをサポート：
      - ''
      - '- **explore**：コードベースの高速探索'
      - '- **general**：複数ステップの複雑タスク実行'
      - ''
      - '### コンテキストの適切な管理'
      - ''
      - OpenCode との会話ではコンテキストを明確に保ちましょう。タスクが完了したら新しいタスクを開始し、情報が混ざらないようにします。
      - ''
      - '## 注意事項'
      - ''
      - '- OpenCode は自動的にコードをコミットしません。明示的に要求する必要があります'
      - '- 機密情報（キー、パスワード）はアップロードされません'
      - '- 生成されたコードはデプロイ前にレビューすることを推奨します'
      - ''
      - '## まとめ'
      - ''
      - OpenCode は AI 機能を開発ワークフローに深く統合し、問題解決とソリューション設計に集中できるようにします。日常開発でも新しい技術の学習でも、頼りになるアシスタントです。
    image: images/opencode-terminal.svg
    readTimeMinutes: 3
    views: 42
  - id: 2
    pinned: true
    showImage: false
    title: JSLY Blog 使用ガイド
    category: Blog
    date: '2026-06-21'
    tags:
      - ガイド
      - チュートリアル
    excerpt: JSLY's Blog へようこそ！このガイドではブログの全機能を紹介し、すぐに使いこなせるようにします。
    content:
      - '## JSLY''s Blog へようこそ'
      - ''
      - JSLY's Blog は GitHub Pages 上に構築された静的ブログで、Vanilla HTML/CSS/JS を使用し、ビルドツールは不要です。スムーズな読書体験、強力な検索機能、多彩なカスタマイズ設定を提供します。このガイドでは各機能を順に説明します。
      - ''
      - '## ナビゲーションとページ構成'
      - ''
      - ホームページは以下のセクションで構成されています：
      - ''
      - '### ヒーローセクション'
      - ''
      - ページ上部にブログタイトルとウェルカムメッセージが表示されます。「読み始める」ボタンをクリックして記事一覧に移動できます。
      - ''
      - '### ナビゲーションバー'
      - ''
      - 上部固定ナビゲーションバーには、ホーム、記事、パブリック投稿、についてのリンクがあります。クリックすると該当セクションにスムーズにスクロールします。現在のセクションのナビゲーション項目はハイライト表示されます。モバイルではハンバーガーメニューに折りたたまれます。
      - ''
      - ナビゲーションバー右側の便利なアイコン：
      - ''
      - '- **ダークモード切替** — ワンクリックでテーマ切替'
      - '- **設定アイコン** — 読書設定を開く'
      - '- **検索アイコン** — 検索ダイアログを開く'
      - '- **メニューボタン** — モバイルでナビゲーションリンクを展開'
      - ''
      - '### 記事一覧'
      - ''
      - 「最新記事」セクションでは全記事がカードグリッドで表示されます。各カードにはタイトル、タグ、概要、公開日、推定読了時間、閲覧数が含まれます。マウスホバーでカードが浮き上がり、影が付きます。
      - ''
      - '### について'
      - ''
      - 「について」セクションではブロガーのプロフィールカードとソーシャルリンク、統計情報が表示されます。カードはダークモードで自動的に切り替わります。
      - ''
      - '### フッター'
      - ''
      - フッターにはソーシャルメディアリンク（QQ、GitHub、Luogu、Qzone、AtCoder）、クイックナビゲーションリンク、連絡先情報が含まれます。
      - ''
      - '## 記事カードの操作'
      - ''
      - 記事カードをクリックして記事詳細を表示します。カバー画像がある場合はカード上部に表示され、ない場合はグラデーションのプレースホルダーが表示されます。
      - ''
      - '## 2つの読書モード'
      - ''
      - ナビゲーションバーの歯車アイコンをクリックして設定を開き、2つの表示モードを切り替えられます：
      - ''
      - '### モーダルモード（デフォルト）'
      - ''
      - 記事が現在のページにモーダルオーバーレイとして開きます。読書進捗バー、ESC キーで閉じる、外部クリックで閉じる、スクロール連動の目次ハイライトなどの機能があります。
      - ''
      - '### 新規ページモード'
      - ''
      - 記事が新しいタブで開きます（`/article/{id}`）。複数の記事を同時に読んだり、ホームページをそのまま残したい場合に適しています。ページ上部に「記事一覧に戻る」リンクがあります。
      - ''
      - 設定は Cookie に保存され、ブラウザを閉じても維持されます。
      - ''
      - '## 検索機能'
      - ''
      - ナビゲーションバーの検索アイコンをクリックして検索ダイアログを開きます。2つの検索方法をサポート：
      - ''
      - '### キーワード検索'
      - ''
      - キーワードを入力すると、記事のタイトル、タグ、概要、全文がリアルタイムでマッチングされ、一致したキーワードがハイライト表示されます。
      - ''
      - '### ピンイン検索'
      - ''
      - pinyin-pro ライブラリを統合しており、ピンイン検索が可能です。例えば「zhinan」と検索するとタイトルに「指南」が含まれる記事がマッチします。2文字以上の入力が必要です。
      - ''
      - '### キーボード操作'
      - ''
      - 検索ダイアログでは ↑/↓ で結果を移動、Enter で選択した記事を開き、ESC で閉じます。
      - ''
      - '## 記事機能'
      - ''
      - 記事を開くと以下の機能が利用できます：
      - ''
      - '### 目次サイドバーとスクロールハイライト'
      - ''
      - 記事本文の左側に目次サイドバーが表示され、H1/H2/H3 見出しから自動生成されます。スクロール中は現在のセクションが目次でハイライト表示されます。目次項目をクリックしてスムーズにジャンプできます。
      - ''
      - '### シェア機能'
      - ''
      - 記事下部にシェアボタンがあります。対応ブラウザではシステムのシェアダイアログを呼び出し、それ以外ではリンクをクリップボードにコピーします。
      - ''
      - '### コメント'
      - ''
      - 各記事の下部に Giscus コメントシステム（GitHub Discussions ベース）が統合されています。GitHub アカウントでログインしてコメントや返信ができます。コメントテーマはダークモードに自動追随します。
      - ''
      - '## ダークモード'
      - ''
      - 月/太陽アイコンをクリックして切り替えます。ナビゲーションバー、記事カード、コードハイライト、プロフィールカード、コメントが自動的に適応します。設定は localStorage に保存され、初回訪問時はシステムテーマが検出されます。
      - ''
      - '## ディープリンク'
      - ''
      - 2種類のディープリンクをサポート：
      - ''
      - '- **ハッシュリンク**：`index.html#article-N` — ホームページで直接記事モーダルを開く'
      - '- **ページリンク**：`/article/{id}` — スタンドアロンページに完全な記事を表示'
      - ''
      - 指定された記事 ID が存在しない場合、自動的に 404 が表示されます。両方のリンク形式は互換性があります。シェアやブックマークには `/article/{id}` 形式を使用してください。
      - ''
      - '## パブリック投稿'
      - ''
      - コミュニティメンバーが記事を投稿できる専用の[パブリック投稿](/public/)セクションがあります。
      - ''
      - '### アクセス方法'
      - ''
      - ナビゲーションバーの「パブリック投稿」をクリックするか、`/public/` に直接アクセスしてください。メインサイトと同じ UI スタイルの専用ページが表示されます。
      - ''
      - '### 投稿方法'
      - ''
      - 2つの投稿方法をサポート：
      - ''
      - '- **GitHub Issue**（推奨）— 「GitHub で投稿」ボタンをクリックし、テンプレートに従って Issue を送信。GitHub ユーザー名が自動的に作者名として使用されます。'
      - '- **メール** — submit@support.jsly.asia に記事のタイトル、本文（Markdown）、署名を添えて送信。'
      - ''
      - 投稿は審査後に公開されます。承認された記事はパブリック投稿セクションに表示されます。
      - ''
      - '### 読書体験'
      - ''
      - パブリック投稿の記事もモーダルモードと新規ページモードの両方をサポートし、目次、コードハイライト、コメント（Giscus）、シェア機能が利用できます。カードには作者バッジが表示され、投稿記事とメイン記事を区別できます。
      - ''
      - '## まとめ'
      - ''
      - JSLY's Blog はシンプルな静的アーキテクチャでありながら、完全で快適な読書体験を提供します。全ソースコードは GitHub でオープンソース公開されています（AGPL-3.0）。ご質問やご提案があれば、フッターの連絡先または記事のコメントからお気軽にお寄せください。
      - ''
      - Happy reading!
    readTimeMinutes: 6
    views: 0
  - id: 3
    title: OpenCode AI Agent 詳細解説
    category: OpenCode
    series:
      name: OpenCode 入门
      order: 2
    date: '2026-06-30'
    tags:
      - OpenCode
      - AI
      - Agent
    excerpt: OpenCode の Agent システムアーキテクチャを深く解説。explore、general などの専用 Agent の仕組みと連携方法を学びます。
    content:
      - '## Agent システム概要'
      - ''
      - OpenCode の中核は Agent システムです。各 Agent は特定タイプのタスクに特化した AI アシスタントです。適切な Agent を選択・組み合わせることで、コード探索から複雑なリファクタリングまで効率的に処理できます。
      - ''
      - '## explore Agent'
      - ''
      - explore Agent はコードベースの高速探索と理解に特化しています：
      - ''
      - '- **クイック検索**：キーワードやパターンで関連コードを検索'
      - '- **アーキテクチャ理解**：プロジェクト構造とモジュール依存関係の分析'
      - '- **コードレビュー**：潜在的な問題の発見とコードロジックの理解'
      - ''
      - '### 使用例'
      - ''
      - '```text'
      - あなた：ユーザー認証に関するすべてのコードを見つけて、フローを説明して
      - explore：「auth」「login」関連ファイルを検索中...
      - '     重要なファイルを発見：'
      - '     - src/auth/login.ts — ログインロジック'
      - '     - src/auth/verify.ts — トークン検証'
      - '     - src/middleware/auth.ts — 認証ミドルウェア'
      - '```'
      - ''
      - '## general Agent'
      - ''
      - general Agent は OpenCode の主力 Agent で、多段階の複雑なタスクを実行できます：
      - ''
      - '- **コードリファクタリング**：既存コードの分析、計画、実行'
      - '- **機能開発**：要件分析から実装までの全フロー'
      - '- **バグ修正**：問題の根本原因を特定して修正'
      - '- **ドキュメント生成**：README、API ドキュメントの生成'
      - ''
      - '### ワークフロー'
      - ''
      - general Agent は複雑なタスクを以下の手順で実行します：
      - ''
      - 1. **要件理解**：自然言語による説明を分析
      - 2. **計画立案**：タスクを実行可能なサブステップに分割
      - 3. **順次実行**：各サブステップを順番に実行
      - 4. **結果検証**：各ステップの出力を確認
      - 5. **報告**：完全な実行サマリーを提供
      - ''
      - '## タスク管理'
      - ''
      - OpenCode は強力なタスク管理機能を提供します：
      - ''
      - '### タスクリスト'
      - ''
      - '```text'
      - あなた：ユーザー権限システム追加のタスクリストを作成して
      - OpenCode：タスクを作成しました：
      - '        [ ] 1. 権限データモデルの設計'
      - '        [ ] 2. ロール管理 CRUD の実装'
      - '        [ ] 3. 権限チェックミドルウェアの追加'
      - '        [ ] 4. 既存ルートへの統合'
      - '        [ ] 5. テストケースの作成'
      - '```'
      - ''
      - '## マルチ Agent 連携'
      - ''
      - 複雑なシナリオでは、複数の Agent が協調して作業できます：
      - ''
      - '- **explore → general**：explore が分析し、結果を general に渡して実行'
      - '- **分業**：explore が分析、general が修正を実行'
      - '- **リレーモード**：一方の出力をもう一方の入力として使用'
      - ''
      - '## ベストプラクティス'
      - ''
      - '- **Agent の指定**：会話の開始時に使用する Agent を明示'
      - '- **段階的実行**：複雑なタスクは小さなステップに分割'
      - '- **進捗確認**：各キーステップ終了後に結果を確認'
      - '- **コンテキストリセット**：タスク完了後は新しい会話を開始'
      - ''
      - '## まとめ'
      - ''
      - OpenCode の Agent システムを習得することが効率的な使用の鍵です。explore はコードの「読み取り」、general はコードの「修正」を担当し、両者の連携で幅広いタスクを処理できます。
    image: images/opencode-terminal.svg
    readTimeMinutes: 5
    views: 0
  - id: 4
    title: OpenCode 高度なテクニックとベストプラクティス
    category: OpenCode
    series:
      name: OpenCode 入门
      order: 3
    date: '2026-06-30'
    tags:
      - OpenCode
      - AI
      - テクニック
    excerpt: 設定最適化、プロンプトエンジニアリング、セキュリティプラクティス、ワークフロー統合など、OpenCode の高度な使用テクニックを習得します。
    content:
      - '## 設定ファイル'
      - ''
      - OpenCode は設定ファイルによるカスタマイズをサポートしています。プロジェクトルートに `.opencode.json` を作成：
      - ''
      - '```json'
      - '{'
      - '  "agents": {'
      - '    "explore": { "maxFiles": 50 },'
      - '    "general": { "autoConfirm": false }'
      - '  },'
      - '  "git": {'
      - '    "autoFetch": true,'
      - '    "commitTemplate": "feat: {message}"'
      - '  },'
      - '  "search": {'
      - '    "excludePatterns": ["node_modules", "dist"]'
      - '  }'
      - '}'
      - '```'
      - ''
      - '## プロンプトエンジニアリング'
      - ''
      - OpenCode とのコミュニケーションの質は出力結果に直接影響します：
      - ''
      - '### 構造化された記述'
      - ''
      - '```text'
      - ❌ この関数を最適化して
      - ✅ src/utils/format.ts の formatDate 関数を最適化：
      - '   - 現在の問題：タイムゾーン未対応、コードが重複'
      - '   - 期待：timezone パラメータ対応、Intl.DateTimeFormat で書き換え'
      - '   - 維持：既存のインターフェースシグネチャは変更しない'
      - '```'
      - ''
      - '## セキュリティプラクティス'
      - ''
      - '### 機密情報の取り扱い'
      - ''
      - '- OpenCode は機密情報をアップロードしませんが、以下の点に注意：'
      - '- キーやパスワードを会話に直接貼り付けない'
      - '- 環境変数や `.env` ファイルで設定を管理'
      - '- テスト用の認証情報がコードに含まれていないか確認'
      - ''
      - '## ワークフロー最適化'
      - ''
      - '### 日常開発フロー'
      - ''
      - '```text'
      - 1. 朝プロジェクトを開く → explore で昨日の変更を確認
      - 2. 新機能を開始 → general に要件分析と計画を依頼
      - 3. 実装 → ステップごとに実行、各ステップ後に確認
      - 4. コードレビュー → explore で変更を確認
      - 5. Git 操作 → OpenCode にステージ、コミット、プッシュを依頼
      - '```'
      - ''
      - '## トラブルシューティング'
      - ''
      - '### OpenCode が期待通りにコードを修正しない'
      - ''
      - 十分なコンテキストと明確な要件を提供したか確認してください。小さなステップに分割してみてください。
      - ''
      - '### エラーが発生した場合'
      - ''
