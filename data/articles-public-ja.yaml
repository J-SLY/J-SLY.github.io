  - id: 2
    title: 洛谷保存站クラウドドライブへようこそ
    showImage: false
    author: Tony Tim
    date: '2026-06-27'
    tags:
      - ツール
      - クラウド
    excerpt: 洛谷保存站クラウドドライブが登場！ログインするだけで256MBの大容量スペースをプレゼント。さまざまなファイル形式に対応、WebDAVマウントやCPOauthクイックログインもサポート。
    content:
      - 洛谷保存站クラウドドライブへようこそ。ログインするだけで256MBの大容量ストレージを利用できます。
      - ''
      - さまざまなファイル形式のアップロードに対応し、WebDAVサービスのマウントもサポートしています。
      - ''
      - 面倒なログイン手順は不要！ [CPOauth](https://cpoauth.com) を使って素早くログインできます。
      - ''
      - '[s.luogu.me](https://s.luogu.me) にアクセスして、サービスをお試しください。'
    readTimeMinutes: 1
    views: 0
  - id: 1
    title: JSLY's Public Blog に投稿する方法
    showImage: false
    author: JSLY
    authorLink: https://github.com/J-SLY
    date: '2026-06-26'
    tags:
      - チュートリアル
    excerpt: JSLY's Public Blog は誰でも記事を投稿できるコミュニティ欄です。このガイドでは、Issueの作成からコンテンツの書式設定まで、記事の投稿方法を順を追って説明します。
    content:
      - '## Public Blog とは？'
      - ''
      - JSLY's Public Blog はブログのコミュニティ投稿欄です。どなたでも記事を投稿し、知識や経験、見解を読者と共有できます。
      - ''
      - '## 投稿の流れ'
      - ''
      - 投稿プロセスはとても簡単です。2つの方法から選べます：
      - ''
      - '### 方法1：GitHub Issue（推奨）'
      - ''
      - '#### ステップ1：「GitHubで投稿」をクリック'
      - ''
      - '[Public Blog トップページ](/public/) で「GitHubで投稿」ボタンをクリックすると、GitHubのIssue作成ページに自動的に遷移し、投稿テンプレートが読み込まれます。'
      - ''
      - '#### ステップ2：テンプレートに記入'
      - ''
      - テンプレートに従って以下の情報を記入してください：
      - ''
      - '- **記事タイトル** — 記事のタイトル（必須）'
      - '- **タグ** — 適切なタグを選択'
      - '- **記事の概要** — 50〜200字の簡単な説明（必須）'
      - '- **記事本文** — Markdown形式で記述（必須）'
      - ''
      - '> 作者名は自動的にGitHubユーザー名が使用されます。'
      - ''
      - 記入が完了したらIssueを送信してください。
      - ''
      - '### 方法2：メール投稿'
      - ''
      - GitHubアカウントをお持ちでない場合は、[submit@blog.jsly.asia](mailto:submit@blog.jsly.asia) または [2029872426@qq.com](mailto:2029872426@qq.com) にメールを送信してください。メールには以下を含めてください：
      - ''
      - '- **記事タイトル**'
      - '- **作者名**（表示したい名前）'
      - '- **タグ分類**'
      - '- **記事の概要**'
      - '- **記事本文**（Markdown形式）'
      - ''
      - 手動でPublic Blogに記事を登録します。
      - ''
      - '### ステップ3：審査をお待ちください（両方法共通）'
      - ''
      - 投稿後、通知を受けて内容を審査します。承認された記事はPublic Blogの記事一覧に表示されます。
      - ''
      - '## Markdown書式リファレンス'
      - ''
      - 本文は標準的なMarkdown構文に対応しています。よく使う書式は以下の通りです：
      - ''
      - '### 見出し'
      - ''
      - '```markdown'
      - '# 見出し1'
      - '## 見出し2'
      - '### 見出し3'
      - '```'
      - ''
      - '### コードブロック'
      - ''
      - 複数言語のシンタックスハイライトに対応：
      - ''
      - '```python'
      - 'def hello():'
      - '    print(''Hello, Public Blog!'')'
      - '```'
      - ''
      - '```javascript'
      - const greeting = 'Hello';
      - console.log(greeting);
      - '```'
      - ''
      - '### リスト'
      - ''
      - '```markdown'
      - '- 順序なしリスト項目'
      - '- 別の項目'
      - ''
      - 1. 順序付きリスト項目
      - 2. 2番目の項目
      - '```'
      - ''
      - '### リンクと画像'
      - ''
      - '```markdown'
      - '[リンクテキスト](https://example.com)'
      - '![画像の説明](画像URL)'
      - '```'
      - ''
      - '## 注意事項'
      - ''
      - 1. **オリジナル性**：ご自身が執筆した記事を投稿してください。転載の場合は原作者の許可が必要です。
      - 2. **内容の規定**：記事の内容は法令に従い、不適切な情報を含んではなりません。
      - 3. **ライセンス**：投稿することで、記事がAGPL-3.0ライセンスで公開されることに同意したものとみなします。
      - 4. **審査基準**：審査は主に形式と内容の準拠性を確認するもので、意見に対する主観的な判断は行いません。
      - ''
      - '## よくある質問'
      - ''
      - '**Q: 投稿にGitHubアカウントは必要ですか？**'
      - 'A: 必須ではありません。GitHub方式ではアカウントが必要ですが、メールで submit@blog.jsly.asia または 2029872426@qq.com に送信することもできます。'
      - ''
      - '**Q: 公開後に記事を修正できますか？**'
      - 'A: はい。Issueを送信するか、ご連絡いただければ更新します。'
      - ''
      - '**Q: 審査にはどのくらい時間がかかりますか？**'
      - 'A: 通常1〜3営業日以内です。'
      - ''
      - '## 最初の投稿を始めよう'
      - ''
      - 以上が投稿ガイドのすべてです。記事の準備ができたら、さっそく[投稿](/public/)してみましょう！
      - ''
      - 素晴らしい共有をお待ちしています 🚀
    readTimeMinutes: 3
    views: 0
