articles:
  - id: 33
    type: feat
    title: データ保存形式を JSON から YAML に移行
    date: 2026-06-30 23:06
    content: |-
      すべてのデータファイルを `.json` から `.yaml` 形式に移行しました：

      - `data/articles-*.json` → `data/articles-*.yaml`
      - `data/articles-public-*.json` → `data/articles-public-*.yaml`
      - `data/articles-change-*.json` → `data/articles-change-*.yaml`
      - js-yaml CDN ライブラリを追加し、クライアント側で YAML を解析
      - すべての fetch 呼び出しを `.yaml` 読み込みに更新し、`jsyaml.load()` で解析
      - 古い JSON ファイルを削除
  - id: 32
    type: chore
    title: コードブロックフォント最適化：Fira Code CDN 読み込みとフォント不整合の修正
    date: 2026-06-30 21:49
    content: |-
      コードブロックのフォント表示に関する複数の修正：

      - Fira Code を Google Fonts CDN から読み込み（ウェイト 400/600/700）、ローカルインストール不要に
      - ダークモードでコードブロックの背景が highlight.js テーマを上書きし文字が見えなくなる問題を修正
      - フォントスタックから非等幅フォント（`DengXian`/`Noto Sans Mono CJK SC`）を除去、ラテン文字がプロポーショナルフォントにフォールバックするのを防止
      - コードブロック内の全ハイライト `<span>` に統一フォントファミリーを強制継承、シンタックスハイライト span 境界でのフォント分岐を解消
      - `pre code` 内の `.hljs-built_in` などのハイライト色差を無効化、同一コマンド内で一部の単語だけ色が変わって不自然に見える問題を修正
