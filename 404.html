<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="页面未找到 - JSLY's Blog">
    <meta property="og:title" content="JSLY's Blog">
    <meta property="og:description" content="JSLY's Blog">
    <meta name="robots" content="noindex">
    <base href="/">
    <title>404 - 页面未找到</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components/cards.css">
    <link rel="stylesheet" href="/css/components/overlay.css">
    <link rel="stylesheet" href="/css/components/article.css">
    <link rel="stylesheet" href="/css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link id="hljs-theme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <link rel="alternate" type="application/rss+xml" title="JSLY's Blog" href="/feed.xml">
</head>
    <body>
    <header>
        <div class="container">
            <nav class="navbar">
                <a href="/" class="logo">JSLY's Blog</a>
                <ul class="nav-links">
                    <li><a href="/">首页</a></li>
                    <li><a href="/#articles">文章</a></li>
                    <li><a href="/#about">关于我</a></li>
                </ul>
                <div class="nav-actions">
                    <div class="dark-mode-toggle" title="切换暗色模式">
                        <i class="fas fa-moon"></i>
                    </div>
                    <div class="search-icon">
                        <i class="fas fa-search"></i>
                    </div>
                    <div class="menu-toggle">
                        <i class="fas fa-bars"></i>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="container" id="app-root">
        <!-- Content will be rendered by JS. If this is not an article route, a 404 message will be shown. -->
        <div id="article-page">
            <a href="/#articles" class="back-to-blog"><i class="fas fa-arrow-left"></i> 返回主页</a>
            <div id="article-content"></div>
        </div>
    </main>

    <!-- Third-party libs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.26.0/dist/index.min.js"></script>

    <!-- App scripts (use absolute paths so they resolve correctly when 404.html is served at any path) -->
    <script src="/js/likes.js"></script>
    <script src="/js/display-mode.js"></script>
    <script src="/js/article-content.js"></script>
    <script src="/js/dark-mode.js"></script>
    <script src="/js/search.js"></script>

    <script>
    // 404 router: if path matches /article/<id> render the article using existing article rendering utilities.
    (function() {
        function showNotFound() {
            document.getElementById('article-content').innerHTML = '<div style="padding:48px;text-align:center;"><h1>404 · 页面未找到</h1><p>您访问的页面不存在。</p><p><a href="/">返回首页</a></p></div>';
        }

        function tryRenderArticleFromPath() {
            // pathnames we want to support:
            // /article/123  -> id = 123
            // /article/123/ -> id = 123
            // also support legacy /article.html?id=123

            var pathname = window.location.pathname || '/';
            var match = pathname.match(/^\/article\/(\d+)\/?$/);
            if (match) {
                var id = parseInt(match[1], 10);
                fetch('/articles.json').then(function(resp) {
                    if (!resp.ok) throw new Error('网络响应不正常');
                    return resp.json();
                }).then(function(data) {
                    var article = data.articles.find(function(a) { return Number(a.id) === id; });
                    if (!article) {
                        showNotFound();
                        return;
                    }
                    // render article content into #article-content
                    document.title = article.title + ' - JSLY\'s Blog';
                    var container = document.getElementById('article-content');
                    container.innerHTML = buildArticleContent(article, false);
                    initArticleHighlights(container);
                    generateTOC(container);
                    initGiscus(container, article.id);
                    updateOGTags(article);
                    initLikeButton(container, article);
                    // hook up share button to the clean URL
                    var shareBtn = container.querySelector('.share-btn');
                    if (shareBtn) {
                        shareBtn.addEventListener('click', function() {
                            var url = window.location.origin + window.location.pathname;
                            if (navigator.share) {
                                navigator.share({ title: article.title, text: article.excerpt, url: url }).catch(function(e){console.log('分享出错:', e);});
                            } else {
                                navigator.clipboard.writeText(url).then(function(){ shareBtn.innerHTML = '<i class="fas fa-check"></i> 链接已复制'; });
                            }
                        }, {once: true});
                    }
                }).catch(function(err) {
                    console.error('加载文章数据时出错:', err);
                    showNotFound();
                });
                return true;
            }

            // legacy support: /article.html?id=123
            var qs = window.location.search || '';
            if (qs.indexOf('id=') !== -1 && pathname.indexOf('article.html') !== -1) {
                var params = new URLSearchParams(qs);
                var id2 = parseInt(params.get('id'), 10);
                if (id2) {
                    // redirect to clean path but keep URL as-is? We'll render in-place to preserve URL.
                    fetch('/articles.json').then(function(resp){ if(!resp.ok) throw new Error('网络响应不正常'); return resp.json(); })
                    .then(function(data){
                        var article = data.articles.find(function(a){ return Number(a.id) === id2; });
                        if (!article) { showNotFound(); return; }
                        document.title = article.title + ' - JSLY\'s Blog';
                        var container = document.getElementById('article-content');
                        container.innerHTML = buildArticleContent(article, false);
                        initArticleHighlights(container);
                        generateTOC(container);
                        initGiscus(container, article.id);
                        updateOGTags(article);
                        initLikeButton(container, article);
                        var shareBtn = container.querySelector('.share-btn');
                        if (shareBtn) {
                            shareBtn.addEventListener('click', function() {
                                var url = window.location.origin + '/article/' + article.id;
                                if (navigator.share) {
                                    navigator.share({ title: article.title, text: article.excerpt, url: url }).catch(function(e){console.log('分享出错:', e);});
                                } else {
                                    navigator.clipboard.writeText(url).then(function(){ shareBtn.innerHTML = '<i class="fas fa-check"></i> 链接已复制'; });
                                }
                            }, {once: true});
                        }
                    }).catch(function(err){ console.error(err); showNotFound(); });
                    return true;
                }
            }

            return false;
        }

        if (!tryRenderArticleFromPath()) {
            // not an article route, show a simple 404 page
            showNotFound();
        }
    })();
    </script>
</body>
</html>
